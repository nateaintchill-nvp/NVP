<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NVP - Nate Vu Private Coaching | Chạm Tới Sự Tỉnh Thức</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Optima', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #050505; 
            color: #f4f4f4; 
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            scroll-behavior: smooth;
        }
        .container { max-width: 1080px; margin: 0 auto; padding: 0 40px; position: relative; z-index: 2; }
        .color-accent { color: #d4af37; }
        .bg-darker { background-color: #121212; }
        .bg-water { background-color: #0a0a0a; }
        
        /* Text Wrapping */
        h1, h2, h3 { 
            font-weight: 400; 
            letter-spacing: 1px; 
            color: #edf2f7; 
            text-wrap: balance; 
        }
        p { text-wrap: pretty; }
        
        /* Header */
        header { 
            padding: 25px 0; 
            border-bottom: 1px solid rgba(214, 175, 55, 0.1); 
            position: sticky; top: 0;
            background-color: rgba(5, 5, 5, 0.95);
            backdrop-filter: blur(10px); z-index: 100;
        }
        .nav-flex { display: flex; justify-content: space-between; align-items: center; }
        .nav-left { display: flex; align-items: baseline; gap: 15px; }
        .logo { font-size: 22px; letter-spacing: 3px; text-transform: uppercase; font-weight: 600;}
        .tagline { font-size: 11px; letter-spacing: 2px; color: #a0a0a0; text-transform: uppercase; }
        
        .header-cta {
            background-color: transparent; color: #d4af37; text-decoration: none;
            padding: 10px 25px; font-size: 13px; text-transform: uppercase;
            font-weight: 600; letter-spacing: 2px; border: 1px solid #d4af37;
            transition: all 0.3s ease;
            white-space: nowrap;
            display: inline-block;
        }
        .header-cta:hover { background-color: #d4af37; color: #050505; }

        /* Section 1: Hero */
        .hero { 
            padding: 180px 0 160px; 
            text-align: center; 
            position: relative;
            background-image: linear-gradient(to bottom, rgba(5, 5, 5, 0.6), rgba(5, 5, 5, 1)), url('https://images.unsplash.com/photo-1581009146145-b5ef050c2e1e?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center top;
            background-attachment: fixed;
        }
        .hero::before {
            content: ''; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); width: 80%; height: 80%;
            background: radial-gradient(circle, rgba(214, 175, 55, 0.15) 0%, rgba(5, 5, 5, 0) 70%);
            z-index: 1; pointer-events: none;
        }
        .staircase-wrapper { display: inline-block; text-align: left; position: relative; z-index: 2; }
        .staircase-wrapper h1 { font-size: 56px; line-height: 1.3; margin: 0; text-shadow: 0 4px 20px rgba(0,0,0,0.8); }
        .staircase-wrapper span.line { display: block; }
        .highlight { color: #d4af37; font-weight: 600; text-shadow: 0 0 15px rgba(214, 175, 55, 0.4); }

        /* Section 2: About */
        .about { padding: 100px 0; text-align: center; }
        .label { font-size: 12px; text-transform: uppercase; letter-spacing: 3px; color: #d4af37; margin-bottom: 20px; display: block; }
        .about h2 { font-size: 32px; max-width: 800px; margin: 0 auto 40px; line-height: 1.4; }

        /* Section 3: Philosophy */
        .philosophy { 
            padding: 120px 0; 
            border-top: 1px solid rgba(214, 175, 55, 0.1);
            position: relative;
            background-image: linear-gradient(to bottom, rgba(5, 5, 5, 1), rgba(5, 5, 5, 0.85), rgba(5, 5, 5, 1)), url('https://images.unsplash.com/photo-1541534741688-6078c6bfb5c5?q=80&w=1920&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; margin-top: 60px; }
        .card { 
            padding: 40px; 
            background-color: rgba(18, 18, 18, 0.85); 
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.05); 
            transition: transform 0.3s ease; 
        }
        .card:hover { transform: translateY(-5px); border-color: rgba(214, 175, 55, 0.3); }
        .card-num { display: block; font-size: 12px; color: #d4af37; letter-spacing: 2px; margin-bottom: 20px; font-weight: 600; }
        .card h3 { font-size: 22px; margin-bottom: 15px; }
        .card p { font-size: 15px; color: #a0a0a0; text-align: justify; }

        /* Tree Map Component */
        .tree-map { margin-top: 60px; }
        .tree-root { text-align: center; position: relative; }
        .tree-root-tag {
            display: inline-block; padding: 14px 34px; border: 1px solid rgba(214, 175, 55, 0.5);
            background-color: rgba(214, 175, 55, 0.06); color: #d4af37; font-size: 13px;
            letter-spacing: 2.5px; text-transform: uppercase; font-weight: 600;
        }
        .tree-trunk { width: 1px; height: 44px; margin: 0 auto; background: linear-gradient(to bottom, rgba(214, 175, 55, 0.5), rgba(214, 175, 55, 0.15)); }
        .tree-timeline { position: relative; max-width: 820px; margin: 0 auto; }
        .tree-timeline::before {
            content: ''; position: absolute; top: 0; bottom: 20px; left: 50%; width: 1px;
            background: linear-gradient(to bottom, rgba(214, 175, 55, 0.4), rgba(214, 175, 55, 0.08));
        }
        .tree-node-row { position: relative; width: 50%; padding-bottom: 46px; }
        .tree-node-row:last-child { padding-bottom: 0; }
        .tree-node-row:nth-child(odd) { left: 0; padding-right: 44px; }
        .tree-node-row:nth-child(even) { left: 50%; padding-left: 44px; }
        .tree-node-row::before {
            content: ''; position: absolute; top: 24px; width: 11px; height: 11px;
            border-radius: 50%; background-color: #050505; border: 1px solid #d4af37; z-index: 2;
        }
        .tree-node-row:nth-child(odd)::before { right: -6px; }
        .tree-node-row:nth-child(even)::before { left: -6px; }
        .tree-node-row::after {
            content: ''; position: absolute; top: 29px; width: 30px; height: 1px;
            background-color: rgba(214, 175, 55, 0.35);
        }
        .tree-node-row:nth-child(odd)::after { right: 0; }
        .tree-node-row:nth-child(even)::after { left: 0; }
        .tree-node-content {
            padding: 26px 30px; background-color: rgba(18, 18, 18, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.06); transition: transform 0.3s ease, border-color 0.3s ease;
        }
        .tree-node-content:hover { transform: translateY(-4px); border-color: rgba(214, 175, 55, 0.3); }
        .tree-map .tree-node-index {
            display: block; font-size: 11px; color: #d4af37; letter-spacing: 2px;
            text-transform: uppercase; font-weight: 600; margin-bottom: 10px;
        }
        .tree-map .tree-node-content h4 { font-size: 19px; font-weight: 400; color: #edf2f7; margin-bottom: 10px; letter-spacing: 0.3px; }
        .tree-map .tree-node-content p { font-size: 14.5px; color: #a0a0a0; text-align: left; margin: 0; }

        /* Section 4: Anywhere */
        .anywhere { padding: 100px 0; border-top: 1px solid rgba(214, 175, 55, 0.1); }
        .anywhere-flex { display: flex; align-items: center; justify-content: space-between; gap: 60px; }
        .anywhere-text { flex: 1; text-align: center;}
        .anywhere-text h2 { font-size: 36px; margin-bottom: 25px; }
        .anywhere-text p { margin-bottom: 20px; font-size: 16px; color: #a0a0a0; max-width: 800px; margin-left: auto; margin-right: auto;}

        /* BÁO GIÁ CTA */
        .pricing-cta-box {
            margin-top: 60px; padding-top: 50px; 
            border-top: 1px dashed rgba(214, 175, 55, 0.2);
        }
        .pricing-cta-box h3 { font-size: 22px; margin-bottom: 20px; }
        
        /* Modal Style (Popup Báo Giá) */
        .modal {
            display: none; position: fixed; z-index: 9999; left: 0; top: 0;
            width: 100%; height: 100%; overflow: hidden;
            background-color: rgba(5, 5, 5, 0.95); backdrop-filter: blur(8px);
        }
        .modal-content {
            position: relative; margin: 2% auto; width: 95%; max-width: 1100px;
            height: 92vh; background: #050505; border: 1px solid #d4af37;
            border-radius: 8px; overflow: hidden; box-shadow: 0 10px 50px rgba(0,0,0,0.8);
            animation: modalFadeIn 0.3s ease-out;
        }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .close-btn {
            position: absolute; top: 15px; right: 25px;
            color: #d4af37; font-size: 40px; font-weight: bold;
            cursor: pointer; z-index: 10; transition: color 0.3s, transform 0.3s;
            background: rgba(0,0,0,0.5); width: 40px; height: 40px; 
            display: flex; align-items: center; justify-content: center; border-radius: 50%;
        }
        .close-btn:hover { color: #fff; transform: scale(1.1); }
        #pricingIframe { width: 100%; height: 100%; border: none; display: block; }

        /* Section 5: Time Value */
        .time-value { 
            padding: 140px 0; text-align: center; border-top: 1px solid rgba(214, 175, 55, 0.1);
            position: relative;
            background-image: linear-gradient(to right, rgba(5, 5, 5, 0.95), rgba(5, 5, 5, 0.8), rgba(5, 5, 5, 0.95)), url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=1920&auto=format&fit=crop'); 
            background-size: cover; background-position: center; background-attachment: fixed;
        }
        .time-value h2 { font-size: 32px; max-width: 800px; margin: 0 auto 30px; line-height: 1.4; }

        /* Section 6: Booking */
        .booking { padding: 120px 0; text-align: center; border-top: 1px solid rgba(214, 175, 55, 0.1); }
        .booking h2 { font-size: 38px; margin-bottom: 20px; }
        .booking p { max-width: 600px; margin: 0 auto 40px; color: #a0a0a0; }
        
        .contact-buttons { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-top: 30px; }
        .contact-btn {
            padding: 18px 35px; font-size: 14px; text-transform: uppercase; letter-spacing: 2px;
            font-weight: 600; text-decoration: none; border-radius: 4px; transition: all 0.3s;
        }
        .zalo-btn { background-color: #0068FF; color: #fff; border: 1px solid #0068FF; }
        .zalo-btn:hover { background-color: transparent; color: #0068FF; }
        .fb-btn { background-color: transparent; color: #d4af37; border: 1px solid #d4af37; }
        .fb-btn:hover { background-color: #d4af37; color: #050505; }

        footer { padding: 40px 0; text-align: center; font-size: 12px; color: #555; letter-spacing: 1px; border-top: 1px solid rgba(214, 175, 55, 0.1); }

        /* Responsive */
        @media (max-width: 1024px) {
            .hero { padding: 150px 0 130px; }
            .staircase-wrapper h1 { font-size: 48px; }
            .grid { grid-template-columns: repeat(2, 1fr); gap: 30px; }
            .container { padding: 0 30px; }
            .hero, .philosophy, .time-value { background-attachment: scroll; }
        }

        @media (max-width: 768px) {
            .hero { padding: 120px 0 100px; }
            .staircase-wrapper h1 { font-size: 36px; }
            .about h2, .time-value h2, .booking h2, .anywhere-text h2 { font-size: 26px; }
            .philosophy h2 { font-size: 26px !important; }
            .grid { grid-template-columns: 1fr; gap: 25px; }
            .card { padding: 30px; }
            .nav-left { flex-direction: column; gap: 5px; align-items: flex-start; }
            .header-cta { padding: 8px 16px; font-size: 11px; }
            .container { padding: 0 20px; }

            .tree-root-tag { padding: 12px 22px; font-size: 12px; letter-
